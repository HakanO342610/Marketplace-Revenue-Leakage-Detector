services:
  postgres:
    image: postgres:16-alpine
    container_name: mrld_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mrld
      POSTGRES_PASSWORD: mrld_local_dev
      POSTGRES_DB: mrld
    ports:
      - "5434:5432"
    volumes:
      - mrld_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrld -d mrld"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mrld_pg_data:
