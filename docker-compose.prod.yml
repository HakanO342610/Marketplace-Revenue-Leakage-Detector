# Production compose for Hetzner deploy.
# Postgres runs externally on Hetzner — we connect via DATABASE_URL.
# Caddy auto-issues SSL certificates from Let's Encrypt for ${DOMAIN}.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mrld-backend:latest
    container_name: mrld_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3101
      NODE_ENV: production
    expose:
      - "3101"
    networks:
      - mrld_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: mrld-frontend:latest
    container_name: mrld_frontend
    restart: unless-stopped
    environment:
      # SSR uses Docker DNS to reach backend over private network
      BACKEND_INTERNAL_URL: http://backend:3101
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - mrld_net

  caddy:
    image: caddy:2-alpine
    container_name: mrld_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - mrld_net

networks:
  mrld_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
