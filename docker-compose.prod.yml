# =====================================================================
# MRLD — Production compose for Hetzner (no domain, IP-only)
# Mirrors the Xpensio deployment pattern: Postgres in Docker, backend
# only on internal Docker network, frontend exposed on host port 3100.
# Add Caddy + a real domain later when product matures.
# =====================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: mrld_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mrld
      POSTGRES_USER: mrld
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # NOT bound to host — internal Docker network only
    volumes:
      - mrld_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrld -d mrld"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mrld_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mrld-backend:latest
    container_name: mrld_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mrld:${POSTGRES_PASSWORD}@postgres:5432/mrld?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3101
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    # NOT exposed to host — frontend proxies via /api/*
    expose:
      - "3101"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mrld_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:3101
    image: mrld-frontend:latest
    container_name: mrld_web
    restart: unless-stopped
    environment:
      # SSR fetches backend through Docker DNS
      BACKEND_INTERNAL_URL: http://backend:3101
      NODE_ENV: production
    ports:
      # Hetzner Cloud Firewall has TCP 3100 open; OS UFW too.
      # When a domain + Caddy lands, swap to 80/443 and remove this.
      - "3100:3000"
    depends_on:
      - backend
    networks:
      - mrld_net

networks:
  mrld_net:
    driver: bridge

volumes:
  mrld_pg_data:
